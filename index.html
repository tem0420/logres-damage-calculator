<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>デスぺ ダメージ計算 </title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--line:#dfe6f3;--text:#152033;--muted:#66758a;--blue:#3867d6;--green:#07935a;--purple:#5a4ee0;--shadow:0 8px 24px rgba(20,35,70,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}.app{max-width:1380px;margin:auto;padding:16px}h1{font-size:22px;margin:0;font-weight:900}.header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}.section{background:var(--card);border:1px solid #edf1f8;border-radius:16px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}.title{font-size:17px;color:#3530b0;font-weight:900;margin:0 0 12px;border-left:4px solid #6255e8;padding-left:8px}button{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 13px;font-weight:800;cursor:pointer;color:#21324a}button.primary{background:#5146d8;color:#fff;border-color:#5146d8}button.danger{color:#c0392b}.actions{display:flex;gap:8px;flex-wrap:wrap}.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.slot-title{font-weight:900;margin:13px 0 8px;color:#334}.card{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:linear-gradient(180deg,#fbfcff,#fff);min-height:150px}.head{background:linear-gradient(90deg,#efedff,#f8f7ff);text-align:center;font-weight:900;color:#3530a5;padding:8px}.body{padding:10px}select,input{width:100%;border:1px solid var(--line);border-radius:9px;background:white;padding:8px 9px;font-size:14px}label{font-size:12px;color:#596a80;font-weight:800;display:block;margin-bottom:4px}.iconrow{display:flex;align-items:center;gap:8px;margin:10px 0}.typeicon{width:34px;height:34px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:900;box-shadow:inset 0 0 0 1px rgba(255,255,255,.35);overflow:hidden;flex:0 0 auto}.typeicon img{width:100%;height:100%;object-fit:cover;display:block}.other{background:linear-gradient(135deg,#3d566e,#8aa0b4)}.wname{font-weight:900;line-height:1.25}.small{font-size:12px;color:var(--muted);line-height:1.55}.statlist{margin-top:8px;border-top:1px dashed #e0e6f2}.statrow{display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px dashed #e9eef7;font-size:12.5px}.statrow span:first-child{color:#66758a}.statrow span:last-child{font-weight:900;color:#152033}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}.detail-box h3{font-size:15px;margin:0 0 8px;color:#2954b8}.settings{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.editor-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:9px}.wide{grid-column:span 2}.results{display:grid;grid-template-columns:1fr 1fr;gap:16px}.result{border-radius:12px;padding:18px;text-align:center;border:1px solid var(--line)}.green{background:linear-gradient(180deg,#f0fff7,#fff);border-color:#ccefdc}.blue{background:linear-gradient(180deg,#f2f7ff,#fff);border-color:#cfe0ff}.rtitle{font-weight:900;font-size:17px}.rval{font-size:34px;font-weight:950;margin:4px 0}.green .rtitle,.green .rval{color:var(--green)}.blue .rtitle,.blue .rval{color:var(--blue)}.formula{font-size:12px;color:#334;word-break:break-all}.bar{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;background:#f4f2ff;border:1px solid #ded9ff;border-radius:10px;padding:11px;margin-top:14px;color:#2f2b91;font-weight:900;text-align:center}table{width:100%;border-collapse:collapse;background:white;border-radius:10px;overflow:hidden;border:1px solid var(--line);margin-top:12px}th,td{border-bottom:1px solid var(--line);padding:8px 9px;font-size:12.5px;text-align:left}th{background:#f2f7ff;color:#2954b8}td:last-child,th:last-child{text-align:right}.notice{background:#fffaf0;border:1px solid #f2ddaa;color:#6b4b00;border-radius:10px;padding:9px 11px;margin-top:10px;font-size:12px}.hidden{display:none}@media(max-width:1100px){.grid5{grid-template-columns:repeat(2,1fr)}.settings,.editor-grid{grid-template-columns:repeat(2,1fr)}.results,.bar,.detail-grid{grid-template-columns:1fr}}@media(max-width:560px){.app{padding:10px}.grid5{grid-template-columns:1fr}.header{align-items:flex-start;flex-direction:column}.rval{font-size:29px}}
</style>
</head>
<body>
<div class="app">
 <div class="header"><h1>デスぺ ダメージ計算</h1><div class="actions"><button type="button" class="primary" id="toggleEditor">武器データ管理を開く</button><button type="button" id="exportData">データ書き出し</button><button type="button" id="importData">データ読み込み</button><button type="button" id="resetAll">全リセット</button><input id="importFile" type="file" accept="application/json,.json" class="hidden"></div></div>
 <section class="section" id="equipSection"><h2 class="title">装備選択</h2><div class="slot-title">表武器（5枠）</div><div class="grid5" id="frontGrid"></div><div class="slot-title">裏武器（5枠）</div><div class="grid5" id="backGrid"></div><div class="slot-title">シックスセンス（1枠）</div><div id="sixGrid" style="max-width:260px"></div><div class="bar"><div>ブラクリ回数：<span id="blackCountLabel">1回</span></div><div>有効リミット：<span id="effectiveLimitLabel">0万</span></div><div>ジョブアビ倍率：<span id="jobAbilityLabel">1.55倍</span></div></div></section>
 <section class="section"><h2 class="title">武器以外の追加要素</h2><div class="settings"><div><label>ベースリミブレ</label><input id="baseLimitRaw" type="number" step="1" value="7999"></div><div><label>追加ブラクリリミプラ 億</label><input id="extraBlackPlusOku" type="number" step="0.01" value="0"></div><div><label>追加通常リミプラ 万</label><input id="extraNormalLimitMan" type="number" step="0.01" value="0"></div><div><label>追加条件付きダメリミ 万</label><input id="extraCondDamageMan" type="number" step="0.01" value="0"></div><div><label>追加条件付きリミプラ 万</label><input id="extraCondPlusMan" type="number" step="0.01" value="0"></div><div><label>味方スキル回数バフ 回</label><input id="extraAllySkill" type="number" step="1" value="0"></div><div><label>ジョブアビ倍率</label><input id="jobAbility" type="number" step="0.01" value="1.55"></div></div><div class="notice">条件付きリミプラは、条件付きダメリミが1以上ある時だけ有効。通常リミプラは常時有効。入力内容はこの端末のブラウザに自動保存されます。</div></section>
 <section class="section hidden" id="editor"><h2 class="title">武器データ管理</h2><p class="small">初期データは空です。登録後、表・裏・シックスセンスのプルダウンに追加されます。</p><div class="editor-grid"><div class="wide"><label>武器名</label><input id="wName" placeholder="例：ジークフリート"></div><div><label>武器種</label><select id="wType"><option>覇剣</option><option>覇双</option><option>轟器</option><option>その他</option></select></div><div><label>ブラクリ上限 億</label><input id="wBlackLimit" type="number" step="0.01"></div><div><label>ブラクリリミプラ 億</label><input id="wBlackPlus" type="number" step="0.01"></div><div><label>ブラクリ+回</label><input id="wBlackAdd" type="number" step="1"></div><div><label>追撃 億</label><input id="wFollow" type="number" step="0.01"></div><div><label>通常リミプラ 万</label><input id="wNormalLimit" type="number" step="0.01"></div><div><label>条件付きダメリミ 万</label><input id="wConditionalDamage" type="number" step="0.01"></div><div><label>条件付きリミプラ 万</label><input id="wConditionalPlus" type="number" step="0.01"></div><div><label>スキル効果 回</label><input id="wSkill" type="number" step="1"></div><div><label>ダメリミ倍率 倍</label><input id="wDmgMul" type="number" step="0.01"></div><div><label>最終倍率 倍</label><input id="wFinalMul" type="number" step="0.01" placeholder="通常は1"></div></div><div class="actions" style="justify-content:flex-end;margin-top:10px"><button type="button" id="clearForm">入力クリア</button><button type="button" class="primary" id="saveWeapon">武器を登録 / 更新</button></div><div class="notice" id="saveNotice" style="display:none">登録しました。上の装備選択プルダウンから選べます。</div><table id="weaponTable"></table></section>
 <section class="section"><h2 class="title">計算結果</h2><div class="results"><div class="result green"><div class="rtitle">上限値</div><div class="rval" id="upperValue">0億</div><div class="formula" id="upperFormula"></div></div><div class="result blue"><div class="rtitle">理論値</div><div class="rval" id="theoryValue">0億</div><div class="formula" id="theoryFormula"></div></div></div><div class="detail-grid"><div class="detail-box"><h3>上限値の内訳</h3><table id="upperBreakTable"></table></div><div class="detail-box"><h3>理論値の内訳</h3><table id="theoryBreakTable"></table></div></div></section>
</div>

const STORAGE_KEY='logres_calc_v12_data';
let savedData=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
let weapons=Array.isArray(savedData.weapons)?savedData.weapons:[];
let slots=savedData.slots||{front:['','','','',''],back:['','','','',''],six:['']};
let extras=savedData.extras||{};
let editingId=null;
function n(v){return Number(v||0)}function fmt(v,d=0){return Number(v||0).toLocaleString('ja-JP',{maximumFractionDigits:Math.abs(Number(v||0)%1)>0.001?2:d})}function oku(v){return fmt(v)+'億'}function man(v){return fmt(v)+'万'}
function typeClass(t){return t==='覇剣'?'haiken':t==='覇双'?'hasou':t==='轟器'?'gouki':'other'}function typeMark(t){return t==='覇剣'?'剣':t==='覇双'?'双':t==='轟器'?'轟':'他'}function iconHtml(t,small=false){const s=small?' style="width:28px;height:28px"':'';return typeImages[t]?`<span class="typeicon"${s}><img src="${typeImages[t]}" alt="${t}"></span>`:`<span class="typeicon other"${s}>${typeMark(t)}</span>`}

function statRows(w){
  if(!w)return '';
  const rows=[];
  const add=(label,val,unit='',force=false)=>{const num=Number(val||0); if(force||Math.abs(num)>0.0001) rows.push(`<div class="statrow"><span>${label}</span><span>${unit==='+'? '+'+fmt(num):fmt(num)}${unit==='+'?'':unit}</span></div>`)};
  add('ブラクリ上限',w.blackLimitOku,'億');
  add('ブラクリリミプラ',w.blackLimitPlusOku,'億');
  add('ブラクリ回数',w.blackAdd,'回','+');
  add('追撃',w.followOku,'億');
  add('通常リミプラ',w.normalMan,'万');
  add('条件付きダメリミ',w.condDamageMan,'万');
  add('条件付きリミプラ',w.condPlusMan,'万');
  add('スキル効果回数',w.skill,'回');
  if(Number(w.mul||1)!==1) rows.push(`<div class="statrow"><span>ダメリミ倍率</span><span>${fmt(w.mul,2)}倍</span></div>`);
  if(Number(w.finalMul||1)!==1) rows.push(`<div class="statrow"><span>最終倍率</span><span>${fmt(w.finalMul,2)}倍</span></div>`);
  return rows.length?`<div class="statlist">${rows.join('')}</div>`:'<div class="small">数値は未入力です</div>';
}
function currentExtras(){return{baseLimitRaw:baseLimitRaw.value,extraBlackPlusOku:extraBlackPlusOku.value,extraNormalLimitMan:extraNormalLimitMan.value,extraCondDamageMan:extraCondDamageMan.value,extraCondPlusMan:extraCondPlusMan.value,extraAllySkill:extraAllySkill.value,jobAbility:jobAbility.value}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify({version:13,weapons,slots,extras:currentExtras()}))}
function applyExtras(){Object.entries(extras||{}).forEach(([k,v])=>{const el=document.getElementById(k);if(el!==null&&el!==undefined)el.value=v})}
function getExtras(){return{baseLimitRaw:n(baseLimitRaw.value),extraBlackPlusOku:n(extraBlackPlusOku.value),extraNormalLimitMan:n(extraNormalLimitMan.value),extraCondDamageMan:n(extraCondDamageMan.value),extraCondPlusMan:n(extraCondPlusMan.value),extraAllySkill:n(extraAllySkill.value),jobAbility:n(jobAbility.value)||1}}
function selectedWeapons(){return groups.flatMap(g=>(slots[g.key]||[]).map(id=>weapons.find(w=>w.id===id)).filter(Boolean))}
function renderSlots(){groups.forEach(g=>{const el=document.getElementById(g.grid);el.innerHTML='';for(let i=0;i<g.count;i++){const id=(slots[g.key]||[])[i]||'';const w=weapons.find(x=>x.id===id);const opts='<option value="">（未選択）</option>'+weapons.map(x=>`<option value="${x.id}" ${x.id===id?'selected':''}>${x.name}</option>`).join('');const div=document.createElement('div');div.className='card';div.innerHTML=`<div class="head">${g.label}${g.count>1?i+1:''}</div><div class="body"><select data-g="${g.key}" data-i="${i}">${opts}</select><div class="iconrow">${w?`${iconHtml(w.type)}<div class="wname">${w.name}</div>`:'<span class="small">武器を選択してください</span>'}</div>${w?statRows(w):''}</div>`;el.appendChild(div)}el.querySelectorAll('select').forEach(s=>s.addEventListener('change',e=>{slots[e.target.dataset.g][Number(e.target.dataset.i)]=e.target.value;save();render()}))})}
function calc(){const ws=selectedWeapons(),ex=getExtras();const blackBase=ws.reduce((a,w)=>a+n(w.blackLimitOku),0);const blackPlus=ws.reduce((a,w)=>a+n(w.blackLimitPlusOku),0)+ex.extraBlackPlusOku;const blackCount=1+ws.reduce((a,w)=>a+n(w.blackAdd),0);const follow=ws.reduce((a,w)=>a+n(w.followOku),0);const baseMan=ex.baseLimitRaw/10000;const normal=ws.reduce((a,w)=>a+n(w.normalMan),0)+ex.extraNormalLimitMan;const condDamage=ws.reduce((a,w)=>a+n(w.condDamageMan),0)+ex.extraCondDamageMan;const condPlusRaw=ws.reduce((a,w)=>a+n(w.condPlusMan),0)+ex.extraCondPlusMan;const condPlus=condDamage>0?condPlusRaw:0;const weaponSkill=ws.reduce((a,w)=>a+n(w.skill),0);const skill=weaponSkill+ex.extraAllySkill;const mul=ws.reduce((a,w)=>a*n(w.mul||1),1);const finalMul=ws.reduce((a,w)=>a*n(w.finalMul||1),1);const fixed=baseMan+normal+condDamage+condPlus;const upperMainBefore=(blackBase+blackPlus)*blackCount;const upperFollowBefore=follow*blackCount;const upperBefore=upperMainBefore+upperFollowBefore;const theoryMainBefore=(fixed*skill*mul/10000)*blackCount*ex.jobAbility;const theoryFollowBefore=follow*blackCount;const theoryBefore=theoryMainBefore+theoryFollowBefore;const upperMain=upperMainBefore*finalMul;const upperFollow=upperFollowBefore*finalMul;const upper=upperBefore*finalMul;const theoryMain=theoryMainBefore*finalMul;const theoryFollow=theoryFollowBefore*finalMul;const theory=theoryBefore*finalMul;return{ex,blackBase,blackPlus,blackCount,follow,baseMan,normal,condDamage,condPlusRaw,condPlus,skill,mul,finalMul,fixed,upperMainBefore,upperFollowBefore,upperBefore,theoryMainBefore,theoryFollowBefore,theoryBefore,upperMain,upperFollow,upper,theoryMain,theoryFollow,theory}}
function renderResults(){const c=calc();upperValue.innerHTML=`<div>${oku(c.upper)}</div><div class="small">本体 ${oku(c.upperMain)} ＋ 追撃 ${oku(c.upperFollow)}</div>`;theoryValue.innerHTML=`<div>${oku(c.theory)}</div><div class="small">本体 ${oku(c.theoryMain)} ＋ 追撃 ${oku(c.theoryFollow)}</div>`;blackCountLabel.textContent=fmt(c.blackCount)+'回';effectiveLimitLabel.textContent=man(c.fixed);jobAbilityLabel.textContent=fmt(c.ex.jobAbility,2)+'倍';upperFormula.textContent=`本体: (${oku(c.blackBase)} + ${oku(c.blackPlus)}) × ${fmt(c.blackCount)} × 最終倍率${fmt(c.finalMul,2)} / 追撃: ${oku(c.follow)} × ${fmt(c.blackCount)} × 最終倍率${fmt(c.finalMul,2)}`;theoryFormula.textContent=`本体: {${man(c.fixed)} × ${fmt(c.skill)}回 × ${fmt(c.mul,2)}倍} × ${fmt(c.blackCount)} × ${fmt(c.ex.jobAbility,2)} × 最終倍率${fmt(c.finalMul,2)} / 追撃: ${oku(c.follow)} × ${fmt(c.blackCount)} × 最終倍率${fmt(c.finalMul,2)}`;upperBreakTable.innerHTML=`<tr><th>項目</th><th>値</th></tr><tr><td>ブラクリ上限合計</td><td>${oku(c.blackBase)}</td></tr><tr><td>ブラクリリミプラ合計</td><td>${oku(c.blackPlus)}</td></tr><tr><td>本体1回分</td><td>${oku(c.blackBase+c.blackPlus)}</td></tr><tr><td>ブラクリ回数倍率</td><td>${fmt(c.blackCount)}倍</td></tr><tr><td>本体上限</td><td>${oku(c.upperMain)}</td></tr><tr><td>追撃1回分</td><td>${oku(c.follow)}</td></tr><tr><td>追撃上限</td><td>${oku(c.upperFollow)}</td></tr><tr><td>最終倍率</td><td>${fmt(c.finalMul,2)}倍</td></tr><tr><td><b>上限値 合計</b></td><td><b>${oku(c.upper)}</b></td></tr>`;
theoryBreakTable.innerHTML=`<tr><th>項目</th><th>値</th></tr><tr><td>ベースリミブレ</td><td>${fmt(c.ex.baseLimitRaw)}（${man(c.baseMan)}）</td></tr><tr><td>通常リミプラ</td><td>${man(c.normal)}</td></tr><tr><td>条件付きダメリミ</td><td>${man(c.condDamage)}</td></tr><tr><td>条件付きリミプラ</td><td>${man(c.condPlusRaw)}${c.condDamage>0?'':'（未発動）'}</td></tr><tr><td>有効リミット合計</td><td>${man(c.fixed)}</td></tr><tr><td>スキル効果回数</td><td>${fmt(c.skill)}回（味方バフ含む）</td></tr><tr><td>味方スキル回数バフ</td><td>+${fmt(c.ex.extraAllySkill)}回</td></tr><tr><td>ダメリミ倍率</td><td>${fmt(c.mul,2)}倍</td></tr><tr><td>ブラクリ回数倍率</td><td>${fmt(c.blackCount)}倍</td></tr><tr><td>ジョブアビ倍率</td><td>${fmt(c.ex.jobAbility,2)}倍</td></tr><tr><td>本体理論値</td><td>${oku(c.theoryMain)}</td></tr><tr><td>追撃1回分</td><td>${oku(c.follow)}</td></tr><tr><td>追撃理論値</td><td>${oku(c.theoryFollow)}</td></tr><tr><td>最終倍率</td><td>${fmt(c.finalMul,2)}倍</td></tr><tr><td><b>理論値 合計</b></td><td><b>${oku(c.theory)}</b></td></tr>`}
function renderTable(){if(!weapons.length){weaponTable.innerHTML='<tr><th>武器データ</th></tr><tr><td>まだ登録されていません。</td></tr>';return}weaponTable.innerHTML='<tr><th>種</th><th>武器名</th><th>ブラ上限</th><th>ブラリミ</th><th>回数+</th><th>追撃</th><th>通常</th><th>条件ダメ</th><th>条件リミ</th><th>スキル</th><th>倍率</th><th>最終倍率</th><th></th></tr>'+weapons.map(w=>`<tr><td>${iconHtml(w.type,true)}</td><td>${w.name}</td><td>${oku(w.blackLimitOku)}</td><td>${oku(w.blackLimitPlusOku)}</td><td>+${fmt(w.blackAdd)}</td><td>${oku(w.followOku)}</td><td>${man(w.normalMan)}</td><td>${man(w.condDamageMan)}</td><td>${man(w.condPlusMan)}</td><td>${fmt(w.skill)}</td><td>${fmt(w.mul,2)}</td><td>${fmt(w.finalMul||1,2)}</td><td><button type="button" onclick="editW('${w.id}')">編集</button> <button type="button" class="danger" onclick="delW('${w.id}')">削除</button></td></tr>`).join('')}
function render(){renderSlots();renderResults();renderTable()}
function clearForm(){editingId=null;['wName','wBlackLimit','wBlackPlus','wBlackAdd','wFollow','wNormalLimit','wConditionalDamage','wConditionalPlus','wSkill','wDmgMul','wFinalMul'].forEach(id=>document.getElementById(id).value='');wType.value='覇剣'}
saveWeapon.onclick=()=>{const name=wName.value.trim();if(!name){alert('武器名を入力してください');return}const id=editingId||('w_'+Date.now());const w={id,name,type:wType.value,blackLimitOku:n(wBlackLimit.value),blackLimitPlusOku:n(wBlackPlus.value),blackAdd:n(wBlackAdd.value),followOku:n(wFollow.value),normalMan:n(wNormalLimit.value),condDamageMan:n(wConditionalDamage.value),condPlusMan:n(wConditionalPlus.value),skill:n(wSkill.value),mul:n(wDmgMul.value)||1,finalMul:n(wFinalMul.value)||1};const idx=weapons.findIndex(x=>x.id===id);if(idx>=0)weapons[idx]=w;else weapons.push(w);save();clearForm();saveNotice.style.display='block';setTimeout(()=>saveNotice.style.display='none',2500);render();equipSection.scrollIntoView({behavior:'smooth',block:'start'})}
window.editW=id=>{const w=weapons.find(x=>x.id===id);if(!w)return;editingId=id;wName.value=w.name;wType.value=w.type;wBlackLimit.value=w.blackLimitOku||'';wBlackPlus.value=w.blackLimitPlusOku||'';wBlackAdd.value=w.blackAdd||'';wFollow.value=w.followOku||'';wNormalLimit.value=w.normalMan||'';wConditionalDamage.value=w.condDamageMan||'';wConditionalPlus.value=w.condPlusMan||'';wSkill.value=w.skill||'';wDmgMul.value=w.mul||'';wFinalMul.value=w.finalMul||'';editor.classList.remove('hidden')}
window.delW=id=>{if(!confirm('削除しますか？'))return;weapons=weapons.filter(w=>w.id!==id);groups.forEach(g=>slots[g.key]=slots[g.key].map(s=>s===id?'':s));save();render()}
toggleEditor.onclick=()=>{editor.classList.toggle('hidden');toggleEditor.textContent=editor.classList.contains('hidden')?'武器データ管理を開く':'武器データ管理を閉じる';if(!editor.classList.contains('hidden'))editor.scrollIntoView({behavior:'smooth'})}
clearForm.onclick=clearForm;resetAll.onclick=()=>{if(confirm('全て初期化しますか？')){localStorage.removeItem(STORAGE_KEY);weapons=[];slots={front:['','','','',''],back:['','','','',''],six:['']};extras={};applyExtras();render()}}
document.querySelectorAll('#baseLimitRaw,#extraBlackPlusOku,#extraNormalLimitMan,#extraCondDamageMan,#extraCondPlusMan,#extraAllySkill,#jobAbility').forEach(el=>el.addEventListener('input',()=>{save();renderResults()}));
exportData.onclick=()=>{save();const data={version:13,weapons,slots,extras:currentExtras(),exportedAt:new Date().toISOString()};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='logres_damage_calculator_data.json';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)};
importData.onclick=()=>importFile.click();
importFile.onchange=e=>{const file=e.target.files&&e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{const data=JSON.parse(r.result);weapons=Array.isArray(data.weapons)?data.weapons:[];slots=data.slots||{front:['','','','',''],back:['','','','',''],six:['']};extras=data.extras||{};applyExtras();save();render();alert('読み込みました')}catch(err){alert('読み込みに失敗しました')}};r.readAsText(file);e.target.value=''};
applyExtras();
render();
</script>
</body>
