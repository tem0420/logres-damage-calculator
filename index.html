<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ログレス ダメージ計算ツール</title>
<style>
:root {
  --bg:#f5f7fb; --card:#fff; --line:#dfe6f3; --text:#102033; --muted:#607086;
  --blue:#356ad8; --green:#0c8f56; --purple:#5b50d8; --shadow:0 8px 24px rgba(20,35,70,.08);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;}
.app{max-width:1280px;margin:0 auto;padding:20px;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;}
h1{font-size:24px;margin:0;font-weight:800;letter-spacing:.02em;}
button,.btn{border:1px solid var(--line);background:white;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;color:#21324a;box-shadow:0 2px 8px rgba(0,0,0,.04)}
button.primary{background:#5146d8;color:white;border-color:#5146d8}
button.danger{background:#fff;color:#c0392b}
.section{background:var(--card);border:1px solid #edf1f8;border-radius:16px;box-shadow:var(--shadow);padding:18px;margin-bottom:16px;}
.section-title{font-size:18px;color:#3230b0;font-weight:800;margin:0 0 14px;border-left:4px solid #6255e8;padding-left:8px;}
.weapon-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
.weapon-card{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:linear-gradient(180deg,#fbfcff,#fff);min-height:240px;}
.weapon-head{background:linear-gradient(90deg,#efedff,#f8f7ff);text-align:center;font-weight:800;color:#3530a5;padding:10px;}
.weapon-body{padding:12px;}
select,input{width:100%;border:1px solid var(--line);border-radius:9px;background:white;padding:9px 10px;font-size:14px;}
.icon-row{display:flex;align-items:center;gap:10px;margin:12px 0 10px;min-height:38px;}
.icon{width:34px;height:34px;object-fit:contain;image-rendering:auto;}
.weapon-name{font-weight:800;line-height:1.3;}
.stats{font-size:13px;color:#26374d;margin-top:8px;}
.stat{display:flex;justify-content:space-between;gap:8px;border-bottom:1px dashed #e8edf5;padding:5px 0;}
.stat span:first-child{color:#65748a;}
.fixed-bar{display:grid;grid-template-columns:1fr 1fr;gap:14px;background:#f4f2ff;border:1px solid #ded9ff;border-radius:10px;padding:12px 16px;margin-top:14px;color:#2f2b91;font-weight:800;text-align:center;}
.results{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.result-box{border-radius:12px;padding:20px;text-align:center;border:1px solid var(--line);}
.result-box.green{background:linear-gradient(180deg,#f0fff7,#fff);border-color:#ccefdc}
.result-box.blue{background:linear-gradient(180deg,#f2f7ff,#fff);border-color:#cfe0ff}
.result-title{font-weight:900;font-size:18px;margin-bottom:4px}
.result-value{font-size:36px;font-weight:900;letter-spacing:.02em;margin:4px 0}
.green .result-value,.green .result-title{color:var(--green)} .blue .result-value,.blue .result-title{color:var(--blue)}
.formula{font-size:13px;color:#334;padding-top:4px;word-break:break-all}
.breakdown{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:14px;}
table{width:100%;border-collapse:collapse;background:white;border-radius:10px;overflow:hidden;border:1px solid var(--line);}
th,td{border-bottom:1px solid var(--line);padding:9px 10px;font-size:13px;text-align:left;}
th{background:#f2f7ff;color:#2954b8} td:last-child,th:last-child{text-align:right;font-weight:800}
.editor{display:none;}
.editor.open{display:block;}
.editor-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:10px;}
.editor-grid .wide{grid-column:span 2}
.small{font-size:12px;color:var(--muted)}
.weapon-list{margin-top:14px;max-height:280px;overflow:auto;}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
@media (max-width: 1000px){.weapon-grid{grid-template-columns:repeat(2,1fr)}.results,.breakdown,.fixed-bar{grid-template-columns:1fr}.editor-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width: 560px){.app{padding:12px}.weapon-grid{grid-template-columns:1fr}.header{align-items:flex-start;flex-direction:column}.result-value{font-size:30px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>⚔️ ログレス ダメージ計算ツール</h1>
    <div class="actions">
      <button id="toggleEditor" class="primary">武器データ管理</button>
      <button id="resetBtn">リセット</button>
    </div>
  </div>

  <section class="section">
    <h2 class="section-title">装備選択（5枠）</h2>
    <div class="weapon-grid" id="weaponGrid"></div>
    <div class="fixed-bar">
      <div>ブラクリ回数合計：<span id="blackCountLabel">3回</span></div>
      <div>ジョブアビ倍率：<span id="jobAbilityLabel">1.55倍</span>（固定）</div>
    </div>
  </section>

  <section class="section editor" id="editor">
    <h2 class="section-title">武器データ管理</h2>
    <p class="small">登録した武器が、上の5枠プルダウンに表示されます。リミット系は「通常リミプラ」「条件付きダメリミ」「条件付きリミプラ」に分けます。</p>
    <div class="editor-grid">
      <input id="wName" class="wide" placeholder="武器名" />
      <select id="wType"><option>覇剣</option><option>覇双</option><option>轟器</option></select>
      <input id="wBlackLimit" type="number" step="0.01" placeholder="ブラクリ上限 億" />
      <input id="wBlackPlus" type="number" step="0.01" placeholder="ブラクリリミプラ 億" />
      <input id="wBlackAdd" type="number" step="1" placeholder="ブラクリ+回" />
      <input id="wFollow" type="number" step="0.01" placeholder="追撃 億" />
      <input id="wNormalLimit" type="number" step="0.01" placeholder="通常リミプラ 万" />
      <input id="wConditionalDamage" type="number" step="0.01" placeholder="条件付きダメリミ 万" />
      <input id="wConditionalPlus" type="number" step="0.01" placeholder="条件付きリミプラ 万" />
      <input id="wSkill" type="number" step="1" placeholder="スキル効果 回" />
      <input id="wDmgMul" type="number" step="0.01" placeholder="ダメリミ倍率 倍" />
    </div>
    <div class="actions">
      <button id="clearForm">入力クリア</button>
      <button id="saveWeapon" class="primary">武器を登録 / 更新</button>
    </div>
    <div class="weapon-list"><table id="weaponTable"></table></div>
  </section>

  <section class="section">
    <h2 class="section-title">計算結果</h2>
    <div class="results">
      <div class="result-box green">
        <div class="result-title">上限値（ブラクリ上限）</div>
        <div class="result-value" id="upperValue">0億</div>
        <div class="formula" id="upperFormula"></div>
      </div>
      <div class="result-box blue">
        <div class="result-title">理論値（ダメージ理論値）</div>
        <div class="result-value" id="theoryValue">0億</div>
        <div class="formula" id="theoryFormula"></div>
      </div>
    </div>
    <div class="breakdown">
      <div>
        <table id="upperTable"></table>
      </div>
      <div>
        <table id="theoryTable"></table>
      </div>
    </div>
  </section>
</div>

const DEFAULT_WEAPONS = [
  {"id":"siegfried","name":"ジークフリート","type":"覇剣","blackLimitOku":400,"blackLimitPlusOku":0,"blackCountAdd":2,"followUpOku":0,"normalLimitPlusMan":0,"conditionalDamageLimitMan":0,"conditionalLimitPlusMan":0,"skillEffect":25,"damageMultiplier":1},
  {"id":"absolshade","name":"アブソルシェイド","type":"轟器","blackLimitOku":0,"blackLimitPlusOku":300,"blackCountAdd":0,"followUpOku":100,"normalLimitPlusMan":0,"conditionalDamageLimitMan":0,"conditionalLimitPlusMan":300,"skillEffect":50,"damageMultiplier":1},
  {"id":"amaterasu_hero","name":"英雄アマテラス","type":"轟器","blackLimitOku":0,"blackLimitPlusOku":40,"blackCountAdd":0,"followUpOku":0,"normalLimitPlusMan":0,"conditionalDamageLimitMan":950,"conditionalLimitPlusMan":0,"skillEffect":26,"damageMultiplier":1},
  {"id":"origin_hero","name":"英雄オリジン","type":"覇剣","blackLimitOku":0,"blackLimitPlusOku":60,"blackCountAdd":0,"followUpOku":0,"normalLimitPlusMan":100,"conditionalDamageLimitMan":0,"conditionalLimitPlusMan":0,"skillEffect":0,"damageMultiplier":36},
  {"id":"alastor","name":"アラストール","type":"覇剣","blackLimitOku":0,"blackLimitPlusOku":0,"blackCountAdd":0,"followUpOku":0,"normalLimitPlusMan":50,"conditionalDamageLimitMan":0,"conditionalLimitPlusMan":0,"skillEffect":20,"damageMultiplier":1}
];
const BASE_LIMIT_BREAK_RAW = 7999;
const BASE_LIMIT_BREAK_MAN = BASE_LIMIT_BREAK_RAW / 10000;
const JOB_ABILITY = 1.55;
const SLOT_COUNT = 5;
let editingId = null;
let weapons = loadWeapons();
let slots = JSON.parse(localStorage.getItem('logres_slots_v2') || '["siegfried","absolshade","amaterasu_hero","origin_hero",""]');
function loadWeapons() {
  try { return JSON.parse(localStorage.getItem('logres_weapons_v2')) || DEFAULT_WEAPONS; } catch(e) { return DEFAULT_WEAPONS; }
}
function saveWeapons() { localStorage.setItem('logres_weapons_v2', JSON.stringify(weapons)); }
function saveSlots() { localStorage.setItem('logres_slots_v2', JSON.stringify(slots)); }
function n(v) { return Number(v || 0); }
function fmt(v, digits=0) {
  const num = Number(v || 0);
  const d = Math.abs(num % 1) > 0.001 ? 2 : digits;
  return num.toLocaleString('ja-JP', {maximumFractionDigits:d});
}
function oku(v) { return fmt(v, 0) + '億'; }
function man(v) { return fmt(v, 0) + '万'; }
function selectedWeapons() { return slots.map(id => weapons.find(w => w.id === id)).filter(Boolean); }
function renderSlots() {
  const grid = document.getElementById('weaponGrid'); grid.innerHTML = '';
  for (let i=0;i<SLOT_COUNT;i++) {
    const selected = weapons.find(w => w.id === slots[i]);
    const card = document.createElement('div'); card.className='weapon-card';
    const opts = ['<option value="">（未選択）</option>'].concat(weapons.map(w => `<option value="${w.id}" ${w.id===slots[i]?'selected':''}>${w.name}</option>`)).join('');
    card.innerHTML = `<div class="weapon-head">武器${i+1}</div><div class="weapon-body"><select data-slot="${i}">${opts}</select><div class="icon-row">${selected ? `<img class="icon" src="${ICONS[selected.type]||''}"><div class="weapon-name">${selected.name}</div>` : '<div class="weapon-name small">武器を選択してください</div>'}</div><div class="stats">${selected ? statHtml(selected) : ''}</div></div>`;
    grid.appendChild(card);
  }
  grid.querySelectorAll('select').forEach(sel => sel.addEventListener('change', e => { slots[Number(e.target.dataset.slot)] = e.target.value; saveSlots(); renderAll(); }));
}
function statHtml(w) {
  const rows = [];
  if(n(w.blackLimitOku)) rows.push(['ブラクリ上限', oku(w.blackLimitOku)]);
  if(n(w.blackLimitPlusOku)) rows.push(['ブラクリリミプラ', oku(w.blackLimitPlusOku)]);
  if(n(w.blackCountAdd)) rows.push(['ブラクリ回数', `+${fmt(w.blackCountAdd)}回`]);
  if(n(w.followUpOku)) rows.push(['追撃', oku(w.followUpOku)]);
  if(n(w.normalLimitPlusMan)) rows.push(['通常リミプラ', man(w.normalLimitPlusMan)]);
  if(n(w.conditionalDamageLimitMan)) rows.push(['条件付きダメリミ', man(w.conditionalDamageLimitMan)]);
  if(n(w.conditionalLimitPlusMan)) rows.push(['条件付きリミプラ', man(w.conditionalLimitPlusMan)]);
  if(n(w.skillEffect)) rows.push(['スキル効果回数', `${fmt(w.skillEffect)}回`]);
  if(n(w.damageMultiplier) && n(w.damageMultiplier)!==1) rows.push(['ダメリミ倍率', `${fmt(w.damageMultiplier,2)}倍`]);
  return rows.map(r=>`<div class="stat"><span>${r[0]}</span><b>${r[1]}</b></div>`).join('');
}
function calc() {
  const ws = selectedWeapons();
  const blackBase = ws.reduce((s,w)=>s+n(w.blackLimitOku),0);
  const blackPlus = ws.reduce((s,w)=>s+n(w.blackLimitPlusOku),0);
  const blackCount = 1 + ws.reduce((s,w)=>s+n(w.blackCountAdd),0);
  const follow = ws.reduce((s,w)=>s+n(w.followUpOku),0);
  const normalLimit = ws.reduce((s,w)=>s+n(w.normalLimitPlusMan),0);
  const conditionalDamage = ws.reduce((s,w)=>s+n(w.conditionalDamageLimitMan),0);
  const conditionalPlusRaw = ws.reduce((s,w)=>s+n(w.conditionalLimitPlusMan),0);
  const hasConditionalDamage = conditionalDamage > 0;
  const conditionalPlusActive = hasConditionalDamage ? conditionalPlusRaw : 0;
  const conditionalPlusInactive = hasConditionalDamage ? 0 : conditionalPlusRaw;
  const fixed = BASE_LIMIT_BREAK_MAN + normalLimit + conditionalDamage + conditionalPlusActive;
  const skill = ws.reduce((s,w)=>s+n(w.skillEffect),0);
  const dmgMul = Math.max(1, ...ws.map(w=>n(w.damageMultiplier)||1));
  const upper = (blackBase + blackPlus) * blackCount + follow * blackCount;
  const theoryMain = (fixed * skill * dmgMul * blackCount * JOB_ABILITY) / 10000;
  const theoryFollow = follow * blackCount;
  const theory = theoryMain + theoryFollow;
  return {ws,blackBase,blackPlus,blackCount,follow,normalLimit,conditionalDamage,conditionalPlusRaw,conditionalPlusActive,conditionalPlusInactive,hasConditionalDamage,fixed,skill,dmgMul,upper,theoryMain,theoryFollow,theory};
}
function renderResults() {
  const c = calc();
  document.getElementById('blackCountLabel').textContent = `${fmt(c.blackCount)}回`;
  document.getElementById('upperValue').textContent = oku(c.upper);
  document.getElementById('theoryValue').textContent = oku(c.theory);
  document.getElementById('upperFormula').textContent = `(ブラクリ上限 ${oku(c.blackBase)} + ブラクリリミプラ ${oku(c.blackPlus)}) × ${fmt(c.blackCount)} + 追撃 ${oku(c.follow)} × ${fmt(c.blackCount)}`;
  document.getElementById('theoryFormula').textContent = `{有効リミット ${man(c.fixed)} × スキル効果 ${fmt(c.skill)}回 × ダメリミ ${fmt(c.dmgMul,2)}倍} × ${fmt(c.blackCount)} × 1.55 + 追撃 ${oku(c.follow)} × ${fmt(c.blackCount)}`;
  document.getElementById('upperTable').innerHTML = `<tr><th>上限値の内訳</th><th>数値</th></tr>
    <tr><td>ブラクリ上限合計</td><td>${oku(c.blackBase)}</td></tr>
    <tr><td>ブラクリリミプラ合計</td><td>${oku(c.blackPlus)}</td></tr>
    <tr><td>小計</td><td>${oku(c.blackBase+c.blackPlus)}</td></tr>
    <tr><td>ブラクリ回数倍率</td><td>${fmt(c.blackCount)}倍</td></tr>
    <tr><td>追撃合計</td><td>${oku(c.follow)}</td></tr>
    <tr><th>上限値</th><th>${oku(c.upper)}</th></tr>`;
  document.getElementById('theoryTable').innerHTML = `<tr><th>理論値の内訳</th><th>数値</th></tr>
    <tr><td>ベースリミットブレイク</td><td>${BASE_LIMIT_BREAK_RAW.toLocaleString('ja-JP')}（${man(BASE_LIMIT_BREAK_MAN)}）</td></tr>
    <tr><td>通常リミプラ合計</td><td>${man(c.normalLimit)}</td></tr>
    <tr><td>条件付きダメリミ合計</td><td>${man(c.conditionalDamage)}</td></tr>
    <tr><td>条件付きリミプラ合計</td><td>${man(c.conditionalPlusRaw)} ${c.conditionalPlusInactive ? '（未発動）' : ''}</td></tr>
    <tr><td>有効リミット合計</td><td>${man(c.fixed)}</td></tr>
    <tr><td>スキル効果回数合計</td><td>${fmt(c.skill)}回</td></tr>
    <tr><td>ダメリミ倍率</td><td>${fmt(c.dmgMul,2)}倍</td></tr>
    <tr><td>ブラクリ回数倍率</td><td>${fmt(c.blackCount)}倍</td></tr>
    <tr><td>ジョブアビ倍率</td><td>${JOB_ABILITY}倍</td></tr>
    <tr><td>追撃分</td><td>${oku(c.theoryFollow)}</td></tr>
    <tr><th>理論値</th><th>${oku(c.theory)}</th></tr>`;
}
function renderWeaponTable() {
  const table = document.getElementById('weaponTable');
  table.innerHTML = `<tr><th>種</th><th>武器名</th><th>上限</th><th>リミプラ</th><th>回数+</th><th>追撃</th><th>通常</th><th>条件ダメ</th><th>条件リミ</th><th>スキル</th><th>倍率</th><th></th></tr>` + weapons.map(w => `<tr>
    <td><img class="icon" src="${ICONS[w.type]}"></td><td>${w.name}</td><td>${oku(w.blackLimitOku)}</td><td>${oku(w.blackLimitPlusOku)}</td><td>+${fmt(w.blackCountAdd)}回</td><td>${oku(w.followUpOku)}</td><td>${man(w.normalLimitPlusMan)}</td><td>${man(w.conditionalDamageLimitMan)}</td><td>${man(w.conditionalLimitPlusMan)}</td><td>${fmt(w.skillEffect)}回</td><td>${fmt(w.damageMultiplier,2)}倍</td><td><button onclick="editWeapon('${w.id}')">編集</button> <button class="danger" onclick="deleteWeapon('${w.id}')">削除</button></td>
  </tr>`).join('');
}
function fillForm(w={}) {
  document.getElementById('wName').value = w.name || '';
  document.getElementById('wType').value = w.type || '覇剣';
  document.getElementById('wBlackLimit').value = w.blackLimitOku || '';
  document.getElementById('wBlackPlus').value = w.blackLimitPlusOku || '';
  document.getElementById('wBlackAdd').value = w.blackCountAdd || '';
  document.getElementById('wFollow').value = w.followUpOku || '';
  document.getElementById('wNormalLimit').value = w.normalLimitPlusMan || '';
  document.getElementById('wConditionalDamage').value = w.conditionalDamageLimitMan || '';
  document.getElementById('wConditionalPlus').value = w.conditionalLimitPlusMan || '';
  document.getElementById('wSkill').value = w.skillEffect || '';
  document.getElementById('wDmgMul').value = w.damageMultiplier || '';
}
window.editWeapon = function(id) { editingId = id; const w = weapons.find(x=>x.id===id); fillForm(w); document.getElementById('editor').classList.add('open'); }
window.deleteWeapon = function(id) { if(!confirm('削除しますか？')) return; weapons = weapons.filter(w=>w.id!==id); slots = slots.map(s=>s===id?'':s); saveWeapons(); saveSlots(); renderAll(); }
document.getElementById('saveWeapon').addEventListener('click', () => {
  const name = document.getElementById('wName').value.trim(); if(!name) return alert('武器名を入力してください');
  const id = editingId || 'w_' + Date.now();
  const w = { id, name, type:document.getElementById('wType').value,
    blackLimitOku:n(document.getElementById('wBlackLimit').value), blackLimitPlusOku:n(document.getElementById('wBlackPlus').value), blackCountAdd:n(document.getElementById('wBlackAdd').value), followUpOku:n(document.getElementById('wFollow').value), normalLimitPlusMan:n(document.getElementById('wNormalLimit').value), conditionalDamageLimitMan:n(document.getElementById('wConditionalDamage').value), conditionalLimitPlusMan:n(document.getElementById('wConditionalPlus').value), skillEffect:n(document.getElementById('wSkill').value), damageMultiplier:n(document.getElementById('wDmgMul').value)||1 };
  const idx = weapons.findIndex(x=>x.id===id); if(idx>=0) weapons[idx]=w; else weapons.push(w);
  editingId=null; fillForm(); saveWeapons(); renderAll();
});
document.getElementById('clearForm').addEventListener('click',()=>{ editingId=null; fillForm(); });
document.getElementById('toggleEditor').addEventListener('click',()=>document.getElementById('editor').classList.toggle('open'));
document.getElementById('resetBtn').addEventListener('click',()=>{ if(confirm('初期状態に戻しますか？')) { localStorage.removeItem('logres_weapons_v2'); localStorage.removeItem('logres_slots_v2'); weapons=DEFAULT_WEAPONS; slots=["siegfried","absolshade","amaterasu_hero","origin_hero",""]; renderAll(); } });
function renderAll() { renderSlots(); renderResults(); renderWeaponTable(); }
renderAll();
</script>
</body>
</html>
